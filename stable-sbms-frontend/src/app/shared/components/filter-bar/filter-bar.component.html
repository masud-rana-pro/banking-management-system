<div class="sbms-filter-bar">
  <div class="sbms-filter-heading">
    <span class="sbms-filter-icon" aria-hidden="true">
      <i class="bi bi-funnel-fill"></i>
    </span>
    <div class="sbms-filter-copy">
      <h4>{{ title | sbmsTranslate }}</h4>
      <p>{{ subtitle | sbmsTranslate }}</p>
    </div>
  </div>

  <div class="sbms-filter-body">
    <div class="sbms-filter-controls">
      <ng-content></ng-content>
    </div>

    <div class="sbms-filter-actions">
      <button class="btn btn-primary btn-sm" type="button" (click)="onSearch()">
        <i class="bi bi-search"></i>
        <span>{{ searchLabel | sbmsTranslate }}</span>
      </button>
      <button class="btn btn-outline-secondary btn-sm" type="button" (click)="onReset()">
        <i class="bi bi-arrow-counterclockwise"></i>
        <span>{{ resetLabel | sbmsTranslate }}</span>
      </button>
    </div>
  </div>
</div>
