<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container integration-module">
  <app-page-header title="Integration Management" homeLabel="Home" homeRoute="/integrations/dashboard" currentLabel="Provider List"></app-page-header>

  <app-page-title title="Provider List" subtitle="Manage SMS, email, payment and mobile banking provider configuration with test and log visibility">
    <button *ngIf="can('INTEGRATION_MANAGEMENT_ACCESS')" class="btn btn-outline-primary" routerLink="/integrations/logs"><i class="fa fa-list-alt"></i> Execution Logs</button>
    <button *ngIf="can('INTEGRATION_PROVIDER_CREATE')" class="btn btn-primary" type="button" (click)="openNew()"><i class="fa fa-plus"></i> New Provider</button>
  </app-page-title>

  <app-filter-bar (search)="onSearch()" (reset)="onReset()">
    <app-form-field icon="search"><input class="form-control" placeholder="Search code / name / endpoint / username" [(ngModel)]="filters.keyword" (keyup.enter)="onSearch()"></app-form-field>
    <app-form-field icon="exchange">
      <select class="form-select" [(ngModel)]="filters.providerType">
        <option value="">All Provider Type</option>
        <option value="EMAIL">EMAIL</option>
        <option value="SMS">SMS</option>
        <option value="PAYMENT">PAYMENT</option>
        <option value="MOBILE_BANKING">MOBILE BANKING</option>
        <option value="PUSH">PUSH</option>
        <option value="GENERAL">GENERAL</option>
      </select>
    </app-form-field>
    <app-form-field icon="check-circle">
      <select class="form-select" [(ngModel)]="filters.status">
        <option value="">All Status</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="ARCHIVED">ARCHIVED</option>
      </select>
    </app-form-field>
  </app-filter-bar>

  <app-data-table [loading]="loading" [empty]="!loading && total === 0" emptyTitle="No integration provider found" emptyMessage="Create provider configuration to enable downstream SMS, email, payment or push integrations.">
    <thead>
      <tr>
        <th style="width: 60px;">#</th>
        <th>Provider</th>
        <th>Type</th>
        <th>Auth</th>
        <th>Timeout</th>
        <th>Status</th>
        <th class="text-center" style="width: 250px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index">
        <td>{{ (page - 1) * pageSize + i + 1 }}</td>
        <td><div class="item-name"><strong>{{ item.providerCode }}</strong><span>{{ item.providerName }}</span></div></td>
        <td>{{ getLabel(item.providerType) }}</td>
        <td>{{ getLabel(item.authType) }}</td>
        <td>{{ item.timeoutSec }} sec</td>
        <td><app-status-badge [status]="item.status"></app-status-badge></td>
        <td class="text-center">
          <div class="table-actions">
            <button class="action-btn view" type="button" title="View" (click)="openView(item)"><i class="fa fa-eye"></i></button>
            <button *ngIf="can('INTEGRATION_PROVIDER_EDIT')" class="action-btn edit" type="button" title="Edit" (click)="openEdit(item)"><i class="fa fa-pencil"></i></button>
            <button *ngIf="can('INTEGRATION_PROVIDER_TEST')" class="action-btn test" type="button" title="Test Provider" (click)="testProvider(item)"><i class="fa fa-paper-plane"></i></button>
            <button *ngIf="can('INTEGRATION_MANAGEMENT_ACCESS')" class="action-btn logs" type="button" title="View Logs" (click)="openLogs(item)"><i class="fa fa-list-alt"></i></button>
            <button *ngIf="item.status !== 'ARCHIVED' && can('INTEGRATION_PROVIDER_EDIT')" class="action-btn archive" type="button" title="Archive" (click)="toggleArchive(item)"><i class="fa fa-archive"></i></button>
            <button *ngIf="item.status === 'ARCHIVED' && can('INTEGRATION_PROVIDER_EDIT')" class="action-btn restore" type="button" title="Restore" (click)="toggleArchive(item)"><i class="fa fa-undo"></i></button>
          </div>
        </td>
      </tr>
    </tbody>
  </app-data-table>

  <app-pagination [page]="page" [pageSize]="pageSize" [total]="total" (pageChange)="onPageChange($event)"></app-pagination>
</div>
</div>
