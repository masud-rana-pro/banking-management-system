<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container workflow-module">
  <app-page-header title="Workflow Support" homeLabel="Home" homeRoute="/workflow/dashboard" currentLabel="Workflow History"></app-page-header>

  <app-page-title title="Workflow History List" subtitle="Review module transitions, source status movement, actor trace and workflow remarks">
    <button class="btn btn-outline-secondary" type="button" (click)="onPrint()"><i class="fa fa-print"></i> Print</button>
    <div class="dropdown export-dropdown">
      <button class="btn btn-outline-primary dropdown-toggle" type="button" data-bs-toggle="dropdown">
        <i class="fa fa-download"></i> Export
      </button>
      <ul class="dropdown-menu dropdown-menu-end">
        <li><button class="dropdown-item" type="button" (click)="onExport('csv')">CSV</button></li>
        <li><button class="dropdown-item" type="button" (click)="onExport('pdf')">PDF</button></li>
      </ul>
    </div>
  </app-page-title>

  <app-filter-bar (search)="onSearch()" (reset)="onReset()">
    <app-form-field icon="search">
      <input class="form-control" placeholder="Search module / action / actor" [(ngModel)]="filters.keyword" (keyup.enter)="onSearch()">
    </app-form-field>
    <app-form-field icon="folder-open">
      <input class="form-control" placeholder="Exact module name" [(ngModel)]="filters.moduleName" (keyup.enter)="onSearch()">
    </app-form-field>
  </app-filter-bar>

  <app-data-table [loading]="loading" [empty]="!loading && total === 0" emptyTitle="No workflow history found" emptyMessage="Seed workflow data or perform module actions to populate history.">
    <thead>
      <tr>
        <th style="width: 60px;">#</th>
        <th>Module</th>
        <th>Action</th>
        <th>From</th>
        <th>To</th>
        <th>Actor</th>
        <th class="text-center" style="width: 120px;">Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index">
        <td>{{ (page - 1) * pageSize + i + 1 }}</td>
        <td>{{ item.moduleName }} / {{ item.referenceId }}</td>
        <td>{{ item.actionName }}</td>
        <td>{{ item.fromStatus || '-' }}</td>
        <td><app-status-badge [status]="item.toStatus || 'N/A'"></app-status-badge></td>
        <td>{{ item.actionBy }}</td>
        <td class="text-center">
          <div class="table-actions">
            <button class="action-btn view" type="button" (click)="openView(item)">
              <i class="fa fa-eye"></i>
            </button>
            <button class="action-btn open" type="button" (click)="openSource(item)">
              <i class="fa fa-external-link"></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </app-data-table>

  <app-pagination [page]="page" [pageSize]="pageSize" [total]="total" (pageChange)="onPageChange($event)"></app-pagination>
</div>
</div>
