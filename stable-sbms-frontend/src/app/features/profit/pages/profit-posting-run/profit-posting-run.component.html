<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container profit-module">
  <app-page-header title="Profit Management" homeLabel="Home" homeRoute="/profit/dashboard" currentLabel="Profit Posting Run"></app-page-header>

  <app-page-title title="Profit Posting Run" subtitle="Select a due schedule or account, choose posting date and execute the periodic profit posting cycle">
    <button class="btn btn-outline-primary" routerLink="/profit/postings"><i class="fa fa-list"></i> Posting List</button>
    <button class="btn btn-outline-success" routerLink="/profit/schedules"><i class="fa fa-calendar"></i> Schedule List</button>
    <button class="btn btn-primary" routerLink="/profit/dashboard"><i class="fa fa-home"></i> Dashboard</button>
  </app-page-title>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div *ngIf="!loading" class="form-card profit-posting-run-card">
    <div class="form-grid profit-posting-run-grid">
      <div>
        <label class="form-label">Account</label>
        <select class="form-select" [(ngModel)]="form.accountId">
          <option [ngValue]="null">All eligible accounts</option>
          <option *ngFor="let item of filteredAccounts" [ngValue]="item.id">{{ getAccountLabel(item) }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Schedule</label>
        <select class="form-select" [(ngModel)]="form.scheduleId" (ngModelChange)="onScheduleChange()">
          <option [ngValue]="null">All due schedules</option>
          <option *ngFor="let item of filteredSchedules" [ngValue]="item.id">{{ item.accountNumber }} - {{ item.profitFrequency }} - {{ item.nextPostingDate }}</option>
        </select>
      </div>
      <div>
        <label class="form-label">Posting Date</label>
        <input class="form-control" type="date" [(ngModel)]="form.postingDate">
      </div>
      <div>
        <label class="form-label">Posted By</label>
        <input class="form-control" [(ngModel)]="form.postedBy" placeholder="Auto use system if blank">
      </div>
    </div>
    <div class="mt-3 d-flex gap-2 flex-wrap">
      <button class="btn btn-primary" type="button" [disabled]="running" (click)="submit()"><i class="fa fa-play"></i> {{ running ? 'Running...' : 'Run Profit Posting' }}</button>
    </div>
  </div>

  <div *ngIf="runResult" class="profit-module">
    <div class="summary-row">
      <div class="summary-card">
        <div class="summary-icon primary"><i class="fa fa-cogs"></i></div>
        <div><div class="summary-label">Processed</div><div class="summary-value">{{ runResult.processedCount }}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-icon success"><i class="fa fa-check-circle"></i></div>
        <div><div class="summary-label">Posted</div><div class="summary-value">{{ runResult.postedCount }}</div></div>
      </div>
      <div class="summary-card">
        <div class="summary-icon danger"><i class="fa fa-exclamation-triangle"></i></div>
        <div><div class="summary-label">Failed</div><div class="summary-value">{{ runResult.failedCount }}</div></div>
      </div>
    </div>

    <div class="info-card">
      <div class="card-title-row">
        <h5 class="mb-0">Run Result</h5>
      </div>
      <table class="sub-table">
        <thead>
          <tr><th>Posting Ref</th><th>Account</th><th>Amount</th><th>Status</th><th>Reason</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of runResult.postings">
            <td>{{ item.postingRef }}</td>
            <td>{{ item.accountNumber }}</td>
            <td>{{ item.profitAmount | number:'1.2-2' }}</td>
            <td><app-status-badge [status]="item.status"></app-status-badge></td>
            <td>{{ item.failureReason || '-' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>
