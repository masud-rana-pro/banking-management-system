<ng-container *ngIf="inShellLayout; else authPasswordLayout">
  <div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
    <app-page-header
      title="Account"
      homeLabel="Home"
      homeRoute="/dashboard"
      currentLabel="Change Password">
    </app-page-header>

    <app-page-title
      title="Change Password"
      subtitle="Update your account password using a strong private credential.">
    </app-page-title>

    <div class="change-password-shell">
      <div class="sbms-card pw-card">
        <div class="pw-card-header">
          <div class="pw-icon">
            <i class="bi bi-key-fill"></i>
          </div>
          <div>
            <div class="pw-header-title">Password Security</div>
            <div class="pw-header-sub">Use at least 8 characters and avoid reusing old passwords.</div>
          </div>
        </div>

        <div class="pw-card-body">
          <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
            <div class="pw-field">
              <label class="form-label">
                <i class="bi bi-lock"></i> Current Password
              </label>
              <app-form-field icon="lock">
                <input
                  [type]="showCurrent ? 'text' : 'password'"
                  class="form-control"
                  formControlName="currentPassword"
                  placeholder="Enter current password">
              </app-form-field>
            </div>

            <div class="pw-field">
              <label class="form-label">
                <i class="bi bi-lock-fill"></i> New Password
              </label>
              <app-form-field icon="key">
                <input
                  [type]="showNew ? 'text' : 'password'"
                  class="form-control"
                  formControlName="newPassword"
                  placeholder="Minimum 8 characters">
              </app-form-field>
              <div class="pw-strength" *ngIf="form.get('newPassword')?.value">
                <div class="strength-bar" [ngClass]="strengthClass"></div>
                <span class="strength-label">{{ strengthLabel }}</span>
              </div>
            </div>

            <div class="pw-field">
              <label class="form-label">
                <i class="bi bi-shield-lock"></i> Confirm New Password
              </label>
              <app-form-field icon="shield-lock">
                <input
                  [type]="showConfirm ? 'text' : 'password'"
                  class="form-control"
                  formControlName="confirmPassword"
                  placeholder="Re-enter new password">
              </app-form-field>
              <div class="pw-mismatch" *ngIf="form.get('confirmPassword')?.dirty && form.hasError('mismatch')">
                <i class="bi bi-exclamation-circle-fill"></i>
                Passwords do not match.
              </div>
            </div>

            <div class="pw-actions">
              <button class="btn btn-primary" type="submit" [disabled]="saving || form.invalid">
                <span *ngIf="!saving">
                  <i class="bi bi-floppy2-fill"></i> Update Password
                </span>
                <span *ngIf="saving">
                  <span class="spinner-border spinner-border-sm"></span> Saving...
                </span>
              </button>

              <button class="btn btn-outline-secondary" type="button" (click)="resetForm()">
                <i class="bi bi-arrow-counterclockwise"></i> Reset
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #authPasswordLayout>
  <div class="auth-password-screen">
    <div class="auth-password-card">
      <div class="auth-password-brand">
        <div class="auth-password-logo">
          <i class="bi bi-shield-lock"></i>
        </div>
        <h2>Change Password</h2>
        <p>Secure your account before continuing to the system.</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="pw-field">
          <label class="form-label">
            <i class="bi bi-lock"></i> Current Password
          </label>
          <app-form-field icon="lock">
            <input
              [type]="showCurrent ? 'text' : 'password'"
              class="form-control"

              placeholder="Enter current password">

        <div class="pw-field">

          </app-form-field>
          <div class="pw-strength" *ngIf="form.get('newPassword')?.value">
            <div class="strength-bar" [ngClass]="strengthClass"></div>
            <span class="strength-label">{{ strengthLabel }}</span>
          </div>
        </div>

        <div class="pw-field">
          <label class="form-label">
            <i class="bi bi-shield-lock"></i> Confirm New Password
          </label>
          <app-form-field icon="shield-lock">
            <input
              [type]="showConfirm ? 'text' : 'password'"

          </app-form-field>
          <div class="pw-mismatch" *ngIf="form.get('confirmPassword')?.dirty && form.hasError('mismatch')">
            <i class="bi bi-exclamation-circle-fill"></i>

          </div>
        </div>

        <div class="pw-actions">
          <button class="btn btn-primary" type="submit" [disabled]="saving || form.invalid">
            <span *ngIf="!saving">
              <i class="bi bi-floppy2-fill"></i> Update Password
            </span>
            <span *ngIf="saving">
              <span class="spinner-border spinner-border-sm"></span> Saving...
            </span>
          </button>

          <button class="btn btn-outline-secondary" type="button" (click)="resetForm()">
            <i class="bi bi-arrow-counterclockwise"></i> Reset
          </button>
        </div>
      </form>
    </div>
  </div>
</ng-template>
