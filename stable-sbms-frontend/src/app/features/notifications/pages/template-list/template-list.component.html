<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container notification-module">
  <app-page-header title="Notification & Alerts" homeLabel="Home" homeRoute="/notifications/dashboard" currentLabel="Template List"></app-page-header>

  <app-page-title title="Template List" subtitle="Manage centrally controlled notification content for SMS, email and push delivery">
    <button *ngIf="can('NOTIFICATION_ALERTS_ACCESS')" class="btn btn-outline-primary" routerLink="/notifications/event-rules"><i class="fa fa-bolt"></i> Event Rules</button>
    <button *ngIf="can('NOTIFICATION_TEMPLATE_CREATE')" class="btn btn-primary" type="button" (click)="openNew()"><i class="fa fa-plus"></i> New Template</button>
  </app-page-title>

  <div class="summary-row">
    <div class="summary-card"><div class="summary-icon primary"><i class="fa fa-file-text-o"></i></div><div><div class="summary-label">Total Templates</div><div class="summary-value">{{ allItems.length }}</div></div></div>
    <div class="summary-card"><div class="summary-icon success"><i class="fa fa-check-circle"></i></div><div><div class="summary-label">Active</div><div class="summary-value">{{ activeCount }}</div></div></div>
    <div class="summary-card"><div class="summary-icon warning"><i class="fa fa-archive"></i></div><div><div class="summary-label">Archived</div><div class="summary-value">{{ archivedCount }}</div></div></div>
  </div>

  <app-filter-bar (search)="onSearch()" (reset)="onReset()">
    <app-form-field icon="search"><input class="form-control" placeholder="Search template code / name / content" [(ngModel)]="filters.search" (keyup.enter)="onSearch()"></app-form-field>
    <app-form-field icon="exchange">
      <select class="form-select" [(ngModel)]="filters.channelType">
        <option value="">All Channel</option>
        <option value="EMAIL">EMAIL</option>
        <option value="SMS">SMS</option>
        <option value="PUSH">PUSH</option>
      </select>
    </app-form-field>
    <app-form-field icon="check-circle">
      <select class="form-select" [(ngModel)]="filters.status">
        <option value="">All Status</option>
        <option value="ACTIVE">ACTIVE</option>
        <option value="ARCHIVED">ARCHIVED</option>
      </select>
    </app-form-field>
  </app-filter-bar>

  <app-data-table [loading]="loading" [empty]="!loading && total === 0" emptyTitle="No notification template found" emptyMessage="Create templates to drive event-based alerts and messaging.">
    <thead>
      <tr>
        <th style="width: 60px;">#</th>
        <th>Template</th>
        <th>Channel</th>
        <th>Subject</th>
        <th>Status</th>
        <th class="text-center" style="width: 220px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items; let i = index">
        <td>{{ (page - 1) * pageSize + i + 1 }}</td>
        <td><div class="item-name"><strong>{{ item.templateCode }}</strong><span>{{ item.templateName }}</span></div></td>
        <td>{{ getLabel(item.channelType) }}</td>
        <td>{{ item.subjectText || '-' }}</td>
        <td><app-status-badge [status]="item.status"></app-status-badge></td>
        <td class="text-center">
          <div class="table-actions">
            <button class="action-btn view" type="button" title="View" (click)="openView(item)"><i class="fa fa-eye"></i></button>
            <button *ngIf="can('NOTIFICATION_TEMPLATE_EDIT')" class="action-btn edit" type="button" title="Edit" (click)="openEdit(item)"><i class="fa fa-pencil"></i></button>
            <button *ngIf="item.status !== 'ARCHIVED' && can('NOTIFICATION_TEMPLATE_EDIT')" class="action-btn archive" type="button" title="Archive" (click)="toggleArchive(item)"><i class="fa fa-archive"></i></button>
            <button *ngIf="item.status === 'ARCHIVED' && can('NOTIFICATION_TEMPLATE_EDIT')" class="action-btn restore" type="button" title="Restore" (click)="toggleArchive(item)"><i class="fa fa-undo"></i></button>
          </div>
        </td>
      </tr>
    </tbody>
  </app-data-table>

  <app-pagination [page]="page" [pageSize]="pageSize" [total]="total" (pageChange)="onPageChange($event)"></app-pagination>
</div>
</div>
