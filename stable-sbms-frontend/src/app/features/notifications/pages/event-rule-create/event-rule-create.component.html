<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container notification-module">
  <app-page-header title="Notification & Alerts" homeLabel="Home" homeRoute="/notifications/dashboard" currentLabel="New Event Rule"></app-page-header>

  <app-page-title title="New Event Rule" subtitle="Define which business event will be tracked and used by notification service">
    <button class="btn btn-outline-secondary" type="button" (click)="back()"><i class="fa fa-arrow-left"></i> Back</button>
  </app-page-title>

  <div class="form-card">
    <div class="card-heading">
      <i class="fa fa-bolt"></i>
      <div>
        <h4>Event Rule Setup</h4>
        <p>Define the event identity and source module before it is used by the notification service.</p>
      </div>
    </div>

    <div class="form-grid">
      <div>
        <label class="form-label">Event Code</label>
        <input class="form-control" [(ngModel)]="form.eventCode" placeholder="Auto-generated if blank">
      </div>
      <div>
        <label class="form-label">Reference Module</label>
        <input class="form-control" [(ngModel)]="form.referenceModule" placeholder="CUSTOMER / ACCOUNT / FINANCING etc.">
      </div>
    </div>

    <div class="mt-3">
      <label class="form-label">Event Name</label>
      <input class="form-control" [(ngModel)]="form.eventName" placeholder="Enter event name">
    </div>

    <div class="form-actions">
      <button class="btn btn-outline-secondary" type="button" (click)="back()"><i class="fa fa-times"></i> Cancel</button>
      <button class="btn btn-primary" type="button" (click)="submit()" [disabled]="saving"><i class="fa fa-plus"></i> {{ saving ? 'Saving...' : 'Create Event Rule' }}</button>
    </div>
  </div>
</div>
</div>
