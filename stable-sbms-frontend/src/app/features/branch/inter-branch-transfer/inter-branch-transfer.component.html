<div class="container mx-auto px-5 py-2 pb-5 pt-2 user-module">
<div class="container mx-auto px-5 py-2 branch-transfer-page branch-form-page">
  <app-page-header title="Branch Management" homeLabel="Home" homeRoute="/branches/dashboard" currentLabel="Inter-Branch Transfer"></app-page-header>

  <app-page-title title="Inter-Branch Transfer" subtitle="Prepare branch-to-branch transfer memo and approval trail reference before operational execution">
    <button class="btn btn-outline-primary" routerLink="/branches/dashboard"><i class="fa fa-th-large"></i> Dashboard</button>
    <button class="btn btn-primary" type="button" (click)="prepare()"><i class="fa fa-exchange"></i> Prepare Transfer</button>
  </app-page-title>

  <div class="form-card">
    <div class="form-grid">
      <div class="form-group">
        <label>Source Branch</label>
        <select class="form-select" [(ngModel)]="form.sourceBranchId">
          <option value="">Select source branch</option>
          <option *ngFor="let branch of branches" [value]="branch.id">{{ branch.branchCode }} - {{ branch.branchName }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Branch</label>
        <select class="form-select" [(ngModel)]="form.targetBranchId">
          <option value="">Select target branch</option>
          <option *ngFor="let branch of branches" [value]="branch.id">{{ branch.branchCode }} - {{ branch.branchName }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Transfer Date</label>
        <input class="form-control" type="date" [(ngModel)]="form.transferDate">
      </div>
      <div class="form-group">
        <label>Amount</label>
        <input class="form-control" type="number" min="0" step="0.01" [(ngModel)]="form.amount">
      </div>
      <div class="form-group full">
        <label>Remarks</label>
        <textarea class="form-control" rows="3" [(ngModel)]="form.remarks"></textarea>
      </div>
      <div class="form-group full">
        <label>Approval Trail Note</label>
        <textarea class="form-control" rows="2" [(ngModel)]="form.approvalNote"></textarea>
      </div>
    </div>
  </div>

  <div *ngIf="preview" class="preview-card">
    <div class="preview-head">
      <h5>{{ preview.referenceNo }}</h5>
      <app-status-badge [status]="'PENDING'"></app-status-badge>
    </div>
    <div class="preview-grid">
      <div><small>Source</small><strong>{{ preview.sourceBranchName }}</strong></div>
      <div><small>Target</small><strong>{{ preview.targetBranchName }}</strong></div>
      <div><small>Date</small><strong>{{ preview.transferDate }}</strong></div>
      <div><small>Amount</small><strong>{{ preview.amount | number:'1.2-2' }}</strong></div>
      <div class="full"><small>Remarks</small><strong>{{ preview.remarks || '-' }}</strong></div>
      <div class="full"><small>Approval Trail</small><strong>{{ preview.approvalNote }}</strong></div>
    </div>
  </div>
</div>
</div>
